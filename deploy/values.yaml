# Next-frontend deployment — served at r4c.dataportal.fi behind Envoy Gateway
# cookie routing (ADR-008, infrastructure#2001). The frozen legacy v1.22.6
# Application pins its values source to a pre-rewrite commit and no longer
# reads this file.
#
# Keeps fullnameOverride / serviceAccount.name "r4c-cesium-viewer-beta" from
# the retired beta deployment: avoids Service/Deployment/SA collisions with
# the legacy release in the shared namespace and a Workload Identity
# rebinding. The HTTPRoute in the infrastructure repo targets the
# r4c-cesium-viewer-beta Service by name.
#
# image.tag is maintained by ArgoCD Image Updater (r4c-cesium-viewer-beta
# Application in infrastructure/argocd/apps/templates/regions4climate/).
image:
  repository: ghcr.io/forumviriumhelsinki/r4c-cesium-viewer
  tag: '1.54.0'
# Distinct release name to avoid Service/Deployment collisions with the
# frozen legacy release
fullnameOverride: r4c-cesium-viewer-beta
imagePullSecrets:
- name: ghcr-login-secret
serviceAccount:
  create: true
  # Distinct name to avoid collision with the legacy ServiceAccount
  name: r4c-cesium-viewer-beta
  annotations:
    iam.gke.io/gcp-service-account: pygeoapi@fvh-project-containers-etc.iam.gserviceaccount.com
# Cloud SQL Proxy for both app and migrations
initContainers:
- name: cloud-sql-proxy
  image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.19.0
  restartPolicy: Always
  args:
  - '--structured-logs'
  - '--port=5432'
  - '--auto-iam-authn'
  - 'fvh-project-containers-etc:europe-north1:fvh-postgres'
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
# Database migrations (Helm hook - runs before deployment).
# The next frontend owns the shared regions4climate schema; the frozen
# legacy Application has migrations disabled via valuesObject.
migrations:
  enabled: true
  command: ['sh', '-c']
  args:
  - |
    set -e
    echo "Starting database migrations..."

    # Ensure PostGIS extensions exist
    echo "Ensuring PostGIS extensions..."
    psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS postgis;" || echo "PostGIS may already exist"
    psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS postgis_topology;" || echo "PostGIS topology may already exist"

    # Run migrations
    echo "Running migrations..."
    dbmate status || echo "First run"

    if dbmate up; then
      echo "Migrations complete"

      # Verify critical table exists
      if psql "$DATABASE_URL" -c "SELECT 1 FROM r4c_hsy_building_current LIMIT 1;" > /dev/null 2>&1; then
        echo "Verified r4c_hsy_building_current"
      else
        echo "Missing r4c_hsy_building_current"
        exit 1
      fi
    else
      echo "Migration failed"
      exit 1
    fi

    echo "Migrations completed successfully"
  env:
  - name: DATABASE_URL
    value: 'postgresql://pygeoapi%40fvh-project-containers-etc.iam@127.0.0.1:5432/regions4climate?sslmode=disable'
  - name: DBMATE_MIGRATIONS_DIR
    value: /migrations
  - name: DBMATE_NO_DUMP_SCHEMA
    value: 'true'
  waitForDatabase:
    enabled: true
    host: 127.0.0.1
    port: 5432
    user: 'pygeoapi@fvh-project-containers-etc.iam'
    timeout: 300
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  image:
    tag: 1.54.0
    repository: ghcr.io/forumviriumhelsinki/r4c-cesium-viewer
# Routing is owned by the hand-authored HTTPRoute in the infrastructure repo
# (cookie-based legacy/next selection on r4c.dataportal.fi exceeds what the
# chart's gateway.enabled can express) — see
# infrastructure/argocd/apps/templates/regions4climate/r4c-cesium-viewer-httproute.yaml
gateway:
  enabled: false
ingress:
  enabled: false
# GOFF evaluation key — ExternalSecret pulls the GCP Secret Manager secret
# `r4c_cesium_viewer_goff_client_id` into a co-located K8s secret. The app's
# NGINX injects this key server-side for GOFF relay-proxy evaluation requests.
externalSecret:
  enabled: true
  name: r4c-cesium-viewer-goff
  target:
    name: r4c-cesium-viewer-goff
  data:
  - secretKey: GOFF_API_KEY
    remoteRef:
      key: r4c_cesium_viewer_goff_client_id
env:
- name: SENTRY_AUTH_TOKEN
  valueFrom:
    secretKeyRef:
      name: regions4climate-secrets # pragma: allowlist secret
      key: SENTRY_AUTH_TOKEN
- name: VITE_SENTRY_DSN
  valueFrom:
    secretKeyRef:
      name: regions4climate-secrets # pragma: allowlist secret
      key: VITE_SENTRY_DSN
- name: SENTRY_DSN
  valueFrom:
    secretKeyRef:
      name: regions4climate-secrets # pragma: allowlist secret
      key: SENTRY_DSN
- name: VITE_DIGITRANSIT_KEY
  valueFrom:
    secretKeyRef:
      name: regions4climate-secrets # pragma: allowlist secret
      key: VITE_DIGITRANSIT_KEY
- name: VITE_PYGEOAPI_HOST
  value: 'pygeoapi-helm-webapp.pygeoapi.svc.cluster.local'
- name: VITE_PYGEOAPI_URL
  value: 'https://pygeoapi.dataportal.fi'
- name: GOFF_API_KEY
  valueFrom:
    secretKeyRef:
      name: r4c-cesium-viewer-goff # pragma: allowlist secret
      key: GOFF_API_KEY
replicaCount: 1
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 500m
    memory: 512Mi
# Security context for main container
# Required by Kyverno policies: disallow-privilege-escalation, require-ro-rootfs
securityContext:
  runAsNonRoot: true
  runAsUser: 101 # nginx user in official nginx image
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL
# Volumes required for nginx with readOnlyRootFilesystem
volumes:
- name: nginx-cache
  emptyDir: {}
- name: nginx-run
  emptyDir: {}
- name: nginx-conf
  emptyDir: {}
- name: tmp
  emptyDir: {}
volumeMounts:
- name: nginx-cache
  mountPath: /var/cache/nginx
- name: nginx-run
  mountPath: /var/run
- name: nginx-conf
  mountPath: /etc/nginx/conf.d
- name: tmp
  mountPath: /tmp
keda:
  enabled: true
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
  - type: cron
    metadata:
      timezone: Europe/Helsinki
      start: 0 7 * * 1-5
      end: 0 20 * * 1-5
      desiredReplicas: '1'
